<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── inline lucide-style icons ──────────────────────────────────
const Icon = ({ size = 24, color = "currentColor", children, ...rest }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...rest}>{children}</svg>
);
const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></Icon>;
const AlertTriangle = (p) => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></Icon>;
const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></Icon>;
const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56" /></Icon>;
const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></Icon>;
const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m7 10 5 5 5-5" /><path d="M12 15V3" /></Icon>;
const FileJson = (p) => <Icon {...p}><path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1" /><path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1" /></Icon>;

// ── design tokens (Living Best brand) ──────────────────────────
const T = {
  ink: "#012F2D", ink2: "#0A3E3A", inkLine: "#1C524D",   // deep teal system
  paper: "#F4F1EA", paperLine: "#D6D9CE",                 // warm off-white cards
  dark: "#012F2D", muted: "#8FB0AC", mutedPaper: "#6B7A76",
  build: "#1F9E6E", refine: "#C9922E", notyet: "#C0453B", // semantic traffic-light
  accent: "#02A8C2", mint: "#D8F0E3",                     // Living Best cyan + mint
  display: '"Red Hat Display", ui-sans-serif, system-ui, sans-serif',
  body: '"Open Sans", ui-sans-serif, system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace',
};

const DIMS = [
  { key: "demand", label: "Demand", hi: "someone pays / scrambles when it breaks", lo: "people find it interesting" },
  { key: "pain", label: "Pain / status quo", hi: "costly, ongoing, duct-taped workaround today", lo: "there's no current solution" },
  { key: "customer", label: "Customer specificity", hi: "a named person, role, and consequence", lo: "a category ('SMBs')" },
  { key: "wedge", label: "Wedge", hi: "shippable now, someone pays this week", lo: "need the whole platform first" },
  { key: "learning", label: "Evidence of learning", hi: "watched real usage, was surprised, adapted", lo: "surveys / demos / 'as expected'" },
  { key: "durability", label: "Durability", hi: "specific thesis on why it gets more essential", lo: "'rising tide' / growth-rate" },
];

const BAND = {
  strong: { color: T.build, word: "BUILD", note: "Build the wedge now." },
  refine: { color: T.refine, word: "REFINE", note: "Promising, but load-bearing dimensions are unproven." },
  not_yet: { color: T.notyet, word: "NOT YET", note: "The premise isn't proven. Go get evidence." },
};
const bandFor = (t) => (t >= 45 ? "strong" : t >= 30 ? "refine" : "not_yet");
const scoreColor = (s) => (s >= 7 ? T.build : s >= 4 ? T.refine : T.notyet);

const LOADING = [
  "Reading the product page",
  "Looking for demand evidence",
  "Scoring the founder-mode lens",
  "Estimating the MPI benchmark",
  "Running the expert-panel lens",
];

const KEY_STORE = "gf-appraiser-key";
const PASS_STORE = "gf-appraiser-pass";

// On GitHub Pages / local preview there is no backend — visitors bring their own
// API key. Anywhere else (the EC2 host) a passcode-gated proxy holds the key.
const KEY_MODE = /(^|\.)github\.io$/.test(location.hostname)
  || location.hostname === "localhost" || /^127\./.test(location.hostname)
  || location.protocol === "file:";

// ── MPI benchmark (Living Best QOL study — 135 concepts, real study-wide averages) ──
const MPI_AVG = { addressable: 0.5031, market_interest: 0.273, purchase_interest: 0.1433,
                  intrigue: 0.5436, urgency: 0.5237 };
// Expert framework mined from 30 aging/eldercare + Japan-market expert interviews:
// theme → share of experts who raised it. Verdict prior: 19 mixed / 7 skeptical / 4 positive.
const EXPERT_THEMES = [
  ["Product differentiation / scope", 0.73],
  ["Regulatory / certification (e.g. Japan PMDA, reimbursement)", 0.67],
  ["Incumbent competition / no blue ocean", 0.53],
  ["Elderly adoption / technology resistance", 0.53],
  ["Localization (language + culture)", 0.47],
  ["Distribution / local partner requirement", 0.47],
  ["Funding / who-pays incentive architecture", 0.40],
];

function buildPrompt(url) {
  return `You are a product diagnostic that scores ONE product at this URL through THREE independent lenses. Your job is diagnosis, not encouragement. URL: ${url}

First, research it with web search: what it does, who it is for, pricing, real traction or usage signals, customer reviews, and the status-quo alternative people use today. A marketing website states the founder's claims — it is NOT evidence of demand. Treat claims as claims. Plain, blunt language. Never use: delve, crucial, robust, comprehensive, leverage, landscape, foster, showcase.

═══ LENS 1 — FOUNDER-MODE (YC-style), six dimensions 0–10 each (60 total) ═══
Be stingy: a 7+ needs concrete behavioral evidence (people paying, expanding usage, building a workflow around it, scrambling if it vanished), not a good story or a slick site. Where you only have website claims, cap it low and say what evidence is missing. Take a position on every dimension.
- demand: pays / scrambles when it breaks || people find it interesting
- pain: costly ongoing duct-taped workaround today || there's no current solution
- customer: a named person, role, consequence || a category
- wedge: shippable now, someone pays this week || need the whole platform first
- learning: watched real usage, was surprised, adapted || surveys / demos / as expected
- durability: specific thesis on why it gets MORE essential in 3 years || rising tide / growth-rate
Bands: 45–60 strong; 30–44 refine; <30 not proven. Then 2–3 directions (one minimal wedge, one ideal, optionally one lateral) each with effort S/M/L + risk Low/Med/High; recommend one tied to the weakest dimension; end with ONE concrete evidence-producing action.

═══ LENS 2 — MPI BENCHMARK (Living Best QOL concept-test methodology) ═══
Estimate how this product would score if it were run through a large consumer concept-test survey (the Living Best MPI, a QOL/eldercare study of 135 concepts). Estimate THREE fractions 0–1, grounded in your research and calibrated to the study benchmarks:
- addressable: fraction who would see it as appropriate for at least one buying scenario (did NOT pick "none of the above"). Study average ≈ 0.50.
- market_interest: top-3-box interest with the 3rd box discounted 50%. Study average ≈ 0.27.
- purchase_interest: top-2-box purchase intent with the 2nd box discounted 50%. Study average ≈ 0.14.
Calibration anchors (addressable/interest/purchase → resulting index): BrainHQ 0.61/0.43/0.25→333 (a top performer); Comfort Linen 0.49/0.28/0.21→150; Assistme 0.39/0.20/0.14→57 (weak); Bleep 0.42/0.20/0.07→33 (bottom). Index 100 = study average. Do NOT compute the index yourself — just estimate the three fractions honestly (most products land near or below the averages) and explain your reasoning in one line, plus one line on how it compares to the benchmark.

═══ LENS 3 — EXPERT PANEL (secondary cross-reference) ═══
Assess as our panel of 30 aging/eldercare + Japan-market experts would. They are skeptical by default (of 30 interviews: 19 mixed, 7 skeptical, only 4 positive) and consistently probe these themes (share of experts who raised each): ${EXPERT_THEMES.map(([t, p]) => `${t} (${Math.round(p * 100)}%)`).join("; ")}. Judge the product against each relevant theme; do not invent enthusiasm. If it is lukewarm or fails a theme, say so. For each risk set how hard it is to overcome for market entry: "hard" = likely to block or materially delay entry unless resolved; "medium" = a real obstacle that adds cost or time or needs a specific mitigation; "easy" = a minor, manageable concern. Give an overall verdict on the same 5-point scale the panel used. State the single strongest Japan-market-entry risk and any genuine enabler. If the product is outside eldercare/Japan, apply the same lens by analogy and say so.

Respond with ONLY a JSON object, no markdown, no preamble, exactly this shape:
{"product":"","one_liner":"","summary":"2-3 sentence read of what you found",
 "dimensions":[{"key":"demand","score":0,"justification":"one line tied to a fact you found","evidence_missing":"what you couldn't find","change_my_mind":"what evidence would move this"}],
 "weakest_link":"<dimension key>","verdict":"one blunt sentence",
 "directions":[{"label":"","kind":"minimal_wedge|ideal|lateral","effort":"S|M|L","risk":"Low|Med|High","summary":""}],
 "recommendation":"one line tied to the weakest dimension","assignment":"one concrete action",
 "mpi":{"addressable":0.0,"market_interest":0.0,"purchase_interest":0.0,"rationale":"one line on why these fractions","vs_benchmark":"one line vs study averages"},
 "expert":{"overall_verdict":"enthusiastic_endorse|endorse|mixed|skeptical|reject","risks":[{"theme":"","severity":"hard|medium|easy","note":"one line"}],"strengths":["one line"],"japan_entry":"single strongest entry risk or enabler","vs_quant":"expert_more_bullish|aligned|expert_more_bearish","reading":"1-2 sentences: what the expert lens adds beyond the survey score"}}
All six YC dimensions in the array, in order.`;
}

// derive MPI indices from the three estimated fractions using the real study averages
function computeMpi(mpi) {
  if (!mpi) return null;
  const a = Number(mpi.addressable) || 0, i = Number(mpi.market_interest) || 0, p = Number(mpi.purchase_interest) || 0;
  const intrigue = a ? i / a : 0, urgency = i ? p / i : 0;
  const cp = (a / MPI_AVG.addressable) * (i / MPI_AVG.market_interest) * (p / MPI_AVG.purchase_interest) * 100;
  const ur = (intrigue / MPI_AVG.intrigue) * (urgency / MPI_AVG.urgency) * 100;
  const quadrant = cp >= 200 && ur >= 100 ? "SUPERSTAR" : cp >= 100 && ur >= 100 ? "STAR"
    : cp >= 100 ? "SLOTH" : ur >= 100 ? "LION CUB" : "PROBLEM CHILD";
  return { ...mpi, intrigue, urgency, concept_potential: Math.round(cp), user_readiness: Math.round(ur), quadrant };
}

function extractJSON(data) {
  const text = (data.content || [])
    .filter((b) => b.type === "text").map((b) => b.text).join("\n");
  const a = text.indexOf("{"), b = text.lastIndexOf("}");
  if (a === -1 || b === -1) throw new Error("No appraisal came back. Try again.");
  return JSON.parse(text.slice(a, b + 1));
}

// Browsers name a "Save as PDF" file after document.title — set it to the
// concept name for the duration of the print, then restore it.
function savePdf(result) {
  const name = "Living Best Appraisal — " + (result.product || "Untitled product");
  const prev = document.title;
  document.title = name;
  const restore = () => { document.title = prev; window.removeEventListener("afterprint", restore); };
  window.addEventListener("afterprint", restore);
  setTimeout(restore, 60000); // fallback if afterprint never fires
  window.print();
}

function downloadJSON(result) {
  const slug = (result.product || "appraisal").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 40);
  const blob = new Blob([JSON.stringify(result, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `living-best-appraisal-${slug || "result"}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function Appraiser() {
  const [url, setUrl] = useState("");
  // On GitHub Pages there is no proxy, so it is always bring-your-own-key.
  // On the hosted proxy, the user can pick: shared passcode OR their own key.
  const [authMode, setAuthMode] = useState(KEY_MODE ? "byokey" : "passcode");
  const byo = KEY_MODE || authMode === "byokey"; // true → call Anthropic directly with the entered key
  // Two independent credentials. On the hosted host, BYO mode needs BOTH: the
  // access passcode (gate, verified server-side) AND the user's own API key.
  const needsPass = !KEY_MODE;               // hosted host always requires the passcode
  const load = (k) => { try { return localStorage.getItem(k) || ""; } catch (e) { return ""; } };
  const [keyVal, setKeyVal] = useState(() => load(KEY_STORE));
  const [passVal, setPassVal] = useState(() => load(PASS_STORE));
  const saveKeyVal = (v) => { setKeyVal(v); try { localStorage.setItem(KEY_STORE, v); } catch (e) {} };
  const savePassVal = (v) => { setPassVal(v); try { localStorage.setItem(PASS_STORE, v); } catch (e) {} };
  const [state, setState] = useState("idle"); // idle | loading | done | error
  const [result, setResult] = useState(null);
  const [err, setErr] = useState("");
  const [li, setLi] = useState(0);
  const timer = useRef(null);

  function switchMode(m) { setAuthMode(m); setErr(""); }
  function fail(msg) { setErr(msg); setState("error"); }

  useEffect(() => {
    if (state === "loading") {
      timer.current = setInterval(() => setLi((i) => (i + 1) % LOADING.length), 1900);
    } else clearInterval(timer.current);
    return () => clearInterval(timer.current);
  }, [state]);

  async function run() {
    const clean = url.trim();
    if (!clean) return;
    const key = keyVal.replace(/\s+/g, "");   // strip spaces/newlines from a wrapped paste
    const pass = passVal.replace(/\s+/g, "");
    // validate the credentials this mode needs
    if (needsPass && !pass) return fail("Enter the access passcode first.");
    if (byo && !key) return fail("Add your Anthropic API key first.");
    setState("loading"); setErr(""); setResult(null); setLi(0);
    try {
      // hosted BYO: verify the passcode gate server-side before spending the key
      if (byo && needsPass) {
        const vr = await fetch("api/verify", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ passcode: pass }),
        });
        if (!vr.ok) return fail(vr.status === 401 ? "Wrong access passcode." : "Passcode check failed (" + vr.status + "). Try again.");
      }
      const res = byo
        ? await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 6000,
              messages: [{ role: "user", content: buildPrompt(clean) }],
              tools: [{ type: "web_search_20250305", name: "web_search" }],
            }),
          })
        : await fetch("api/appraise", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: clean, passcode: pass }),
          });
      if (!res.ok) {
        let detail = "";
        try { const e = await res.json(); detail = (e && e.error && e.error.message) || ""; } catch (x) {}
        const labels = { 401: "Authentication failed (401)", 403: "Permission denied (403)", 429: "Rate limited (429)", 400: "Bad request (400)" };
        const head = labels[res.status] || ("Request failed (" + res.status + ")");
        throw new Error(detail ? (head + " — " + detail) : (head + ". Try again."));
      }
      const json = await res.json();
      const parsed = extractJSON(json);
      parsed.total = (parsed.dimensions || []).reduce((s, d) => s + (Number(d.score) || 0), 0);
      parsed.mpi = computeMpi(parsed.mpi);
      parsed.url = clean;
      setResult(parsed); setState("done");
    } catch (e) {
      setErr(e.message || "Something broke. Try again."); setState("error");
    }
  }

  function reset() { setState("idle"); setResult(null); setUrl(""); setErr(""); }

  return (
    <div style={{ background: T.ink, minHeight: "100vh", color: T.paper, fontFamily: T.body }}>
      <div style={{ maxWidth: 880, margin: "0 auto", padding: "clamp(24px,5vw,56px) clamp(18px,5vw,40px)" }}>

        {/* masthead */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${T.inkLine}`, paddingBottom: 16, marginBottom: "clamp(28px,6vw,44px)", gap: 14, flexWrap: "wrap" }}>
          <img src="lb-logo.svg" alt="Living Best" style={{ height: 104, width: "auto" }} />
          <span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.muted, whiteSpace: "nowrap" }}>APPRAISER · THREE-LENS</span>
        </div>

        {/* input / hero */}
        {state !== "done" && (
          <div style={{ marginBottom: 8 }}>
            <h1 style={{ fontFamily: T.display, fontWeight: 500, fontSize: "clamp(30px,6vw,52px)", lineHeight: 1.04, letterSpacing: "-0.02em", margin: "0 0 18px", color: T.paper }}>
              Paste a product.<br />Get the verdict, not the pitch.
            </h1>
            <p style={{ color: T.muted, fontSize: 15, lineHeight: 1.6, maxWidth: 580, margin: "0 0 30px" }}>
              It researches the product, then scores it through three lenses — founder-mode judgement, the Living Best MPI benchmark, and a 30-expert panel review. A slick site counts for nothing on its own.
            </p>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <div style={{ flex: "1 1 320px", display: "flex", alignItems: "center", gap: 10, background: T.ink2, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "0 14px" }}>
                <Search size={16} color={T.muted} />
                <input
                  value={url} onChange={(e) => setUrl(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && state !== "loading" && run()}
                  placeholder="https://…  product page URL"
                  disabled={state === "loading"}
                  style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: T.paper, fontFamily: T.mono, fontSize: 14, padding: "15px 0" }}
                />
              </div>
              <button onClick={run} disabled={state === "loading" || !url.trim()}
                style={{ background: T.paper, color: T.dark, border: "none", borderRadius: 2, padding: "0 24px", fontFamily: T.mono, fontWeight: 700, fontSize: 13, letterSpacing: "0.08em", cursor: state === "loading" || !url.trim() ? "default" : "pointer", opacity: state === "loading" || !url.trim() ? 0.5 : 1, display: "flex", alignItems: "center", gap: 8 }}>
                {state === "loading" ? <Loader2 size={15} className="spin" /> : null}
                {state === "loading" ? "WORKING" : "APPRAISE"}
              </button>
            </div>

            {/* auth: on the hosted proxy, let the user choose passcode or their own key */}
            {!KEY_MODE && (
              <div style={{ marginTop: 14, display: "flex", gap: 6 }}>
                {[["passcode", "Passcode"], ["byokey", "Your API key"]].map(([m, label]) => (
                  <button key={m} onClick={() => switchMode(m)}
                    style={{ background: authMode === m ? T.ink2 : "transparent", color: authMode === m ? T.paper : T.muted, border: `1px solid ${authMode === m ? T.accent : T.inkLine}`, borderRadius: 2, padding: "7px 14px", fontFamily: T.mono, fontSize: 11, letterSpacing: "0.06em", cursor: "pointer" }}>
                    {label}
                  </button>
                ))}
              </div>
            )}

            {/* credential fields — passcode gate (hosted) and/or bring-your-own key */}
            {(() => {
              const row = { marginTop: 10, display: "flex", alignItems: "center", gap: 10, background: T.ink2, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "0 14px" };
              const lab = { fontFamily: T.mono, fontSize: 11, letterSpacing: "0.08em", color: T.muted, whiteSpace: "nowrap" };
              const inp = { flex: 1, background: "transparent", border: "none", outline: "none", color: T.paper, fontFamily: T.mono, fontSize: 13, padding: "13px 0" };
              const onEnter = (e) => e.key === "Enter" && state !== "loading" && url.trim() && run();
              return (<>
                {needsPass && (
                  <div style={row}>
                    <span style={lab}>PASSCODE</span>
                    <input type="password" value={passVal} onChange={(e) => savePassVal(e.target.value)}
                      onKeyDown={onEnter} placeholder="access passcode" autoComplete="off" spellCheck="false" style={inp} />
                  </div>
                )}
                {byo && (
                  <div style={row}>
                    <span style={lab}>API&nbsp;KEY</span>
                    <input type="password" value={keyVal} onChange={(e) => saveKeyVal(e.target.value)}
                      onKeyDown={onEnter} placeholder="sk-ant-…  stored in this browser only" autoComplete="off" spellCheck="false" style={inp} />
                  </div>
                )}
              </>);
            })()}
            <p style={{ color: T.muted, fontSize: 12, lineHeight: 1.55, fontFamily: T.mono, margin: "8px 0 0" }}>
              {byo && needsPass
                ? "Access passcode required. Your own Anthropic key is saved only in this browser and sent directly to api.anthropic.com — the passcode is checked server-side but never sees your key."
                : byo
                ? "Your key is saved only in this browser's localStorage and sent directly to api.anthropic.com — nowhere else. Get a key at console.anthropic.com."
                : "Appraisals run server-side on the shared key — no API key needed. Ask George for the passcode; it's remembered in this browser."}
            </p>
          </div>
        )}

        {/* loading */}
        {state === "loading" && (
          <div style={{ marginTop: 40, fontFamily: T.mono, fontSize: 13, color: T.muted }}>
            {LOADING.map((m, i) => (
              <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", padding: "7px 0", opacity: i <= li ? 1 : 0.3, transition: "opacity .4s" }}>
                <span style={{ color: i < li ? T.build : i === li ? T.paper : T.muted }}>{i < li ? "✓" : i === li ? "›" : "·"}</span>
                <span style={{ color: i === li ? T.paper : "inherit" }}>{m}{i === li ? "…" : ""}</span>
              </div>
            ))}
          </div>
        )}

        {/* error */}
        {state === "error" && (
          <div style={{ marginTop: 28, border: `1px solid ${T.notyet}`, borderRadius: 2, padding: 18, fontFamily: T.mono, fontSize: 13, color: T.paper, display: "flex", gap: 12, alignItems: "center" }}>
            <AlertTriangle size={18} color={T.notyet} />
            <span>{err}</span>
          </div>
        )}

        {/* result */}
        {state === "done" && result && (() => {
          const band = BAND[bandFor(result.total)];
          const m = result.mpi, ex = result.expert;
          const quadColor = (q) => (q === "SUPERSTAR" || q === "STAR") ? T.build
            : (q === "SLOTH" || q === "LION CUB") ? T.refine : T.notyet;
          const vColor = (v) => (v === "enthusiastic_endorse" || v === "endorse") ? T.build
            : v === "mixed" ? T.refine : T.notyet;
          const sevColor = (s) => s === "hard" ? T.notyet : s === "medium" ? T.refine : T.build;
          const pct = (x) => `${Math.round((Number(x) || 0) * 100)}%`;
          return (
            <div>
              {/* verdict header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 20, flexWrap: "wrap", marginBottom: 22 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.muted, marginBottom: 6 }}>{result.url}</div>
                  <h1 style={{ fontFamily: T.display, fontWeight: 700, fontSize: "clamp(26px,5vw,40px)", lineHeight: 1.05, letterSpacing: "-0.02em", margin: "0 0 8px", color: T.paper }}>{result.product || "Untitled product"}</h1>
                  <div style={{ color: T.muted, fontSize: 15, maxWidth: 480 }}>{result.one_liner}</div>
                </div>
                <div style={{ flexShrink: 0, border: `1.5px solid ${band.color}`, borderRadius: 2, padding: "14px 18px", textAlign: "center", minWidth: 124 }}>
                  <div style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 34, lineHeight: 1, color: band.color }}>{result.total}<span style={{ fontSize: 16, color: T.muted }}>/60</span></div>
                  <div style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 13, letterSpacing: "0.14em", color: band.color, marginTop: 8 }}>{band.word}</div>
                </div>
              </div>

              <p style={{ color: T.paper, opacity: 0.85, fontSize: 15, lineHeight: 1.6, borderLeft: `2px solid ${band.color}`, paddingLeft: 14, margin: "0 0 8px" }}>{result.verdict}</p>
              <p style={{ color: T.muted, fontSize: 14, lineHeight: 1.6, paddingLeft: 16, margin: "0 0 32px" }}>{result.summary}</p>

              {/* scorecard on paper */}
              <div style={{ background: T.paper, color: T.dark, borderRadius: 3, padding: "clamp(18px,4vw,28px)" }}>
                <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.mutedPaper, marginBottom: 18 }}>LENS 1 · FOUNDER-MODE (YC) SCORECARD</div>
                {(result.dimensions || []).map((d, i) => {
                  const meta = DIMS.find((x) => x.key === d.key) || { label: d.key };
                  const weak = d.key === result.weakest_link;
                  const sc = Number(d.score) || 0;
                  return (
                    <div key={i} style={{ padding: "16px 0 16px", borderTop: i ? `1px solid ${T.paperLine}` : "none", borderLeft: weak ? `2px solid ${T.notyet}` : "none", paddingLeft: weak ? 14 : 0, marginLeft: weak ? -14 : 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 12 }}>
                        <span style={{ fontFamily: T.display, fontWeight: 500, fontSize: 17, color: T.dark }}>
                          {meta.label}
                          {weak && <span style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: "0.1em", color: T.notyet, marginLeft: 10, verticalAlign: "middle" }}>WEAKEST LINK</span>}
                        </span>
                        <span style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 18, color: scoreColor(sc) }}>{sc}<span style={{ color: T.mutedPaper, fontSize: 12 }}>/10</span></span>
                      </div>
                      <div style={{ height: 5, background: "#DDD9CE", borderRadius: 3, margin: "10px 0 12px", overflow: "hidden" }}>
                        <div style={{ width: `${sc * 10}%`, height: "100%", background: scoreColor(sc), borderRadius: 3 }} />
                      </div>
                      <div style={{ fontSize: 14, lineHeight: 1.55, color: T.dark, marginBottom: 6 }}>{d.justification}</div>
                      {d.evidence_missing && <div style={{ fontSize: 13, lineHeight: 1.5, color: T.mutedPaper }}><span style={{ fontFamily: T.mono, fontSize: 11 }}>missing:</span> {d.evidence_missing}</div>}
                      {d.change_my_mind && <div style={{ fontSize: 13, lineHeight: 1.5, color: T.mutedPaper, fontStyle: "italic" }}>would change this: {d.change_my_mind}</div>}
                    </div>
                  );
                })}
              </div>

              {/* directions */}
              {result.directions && result.directions.length > 0 && (
                <div style={{ marginTop: 32 }}>
                  <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.muted, marginBottom: 14 }}>DIRECTIONS</div>
                  <div style={{ display: "grid", gap: 12 }}>
                    {result.directions.map((dir, i) => (
                      <div key={i} style={{ background: T.ink2, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "16px 18px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10, marginBottom: 7 }}>
                          <span style={{ fontFamily: T.display, fontWeight: 500, fontSize: 16, color: T.paper }}>{dir.label}</span>
                          <span style={{ fontFamily: T.mono, fontSize: 11, color: T.muted, whiteSpace: "nowrap" }}>{dir.effort} · {dir.risk} risk</span>
                        </div>
                        <div style={{ fontSize: 14, lineHeight: 1.55, color: T.muted }}>{dir.summary}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* recommendation + assignment */}
              <div style={{ marginTop: 26, display: "grid", gap: 16 }}>
                {result.recommendation && (
                  <div><span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.muted }}>RECOMMENDATION</span>
                    <div style={{ fontSize: 15, lineHeight: 1.6, color: T.paper, marginTop: 6 }}>{result.recommendation}</div></div>
                )}
                {result.assignment && (
                  <div style={{ borderTop: `1px solid ${T.inkLine}`, paddingTop: 16, display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <ArrowRight size={18} color={T.build} style={{ flexShrink: 0, marginTop: 2 }} />
                    <div><span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.muted }}>DO THIS</span>
                      <div style={{ fontSize: 15, lineHeight: 1.6, color: T.paper, marginTop: 6 }}>{result.assignment}</div></div>
                  </div>
                )}
              </div>

              {/* ── LENS 2 · MPI BENCHMARK ── */}
              {m && (
                <div style={{ marginTop: 40, background: T.paper, color: T.dark, borderRadius: 3, padding: "clamp(18px,4vw,28px)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
                    <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.mutedPaper }}>LENS 2 · MPI BENCHMARK <span style={{ opacity: 0.7 }}>(predicted vs Living Best QOL study)</span></div>
                    <div style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 12, letterSpacing: "0.12em", color: quadColor(m.quadrant) }}>{m.quadrant}</div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
                    {[["CONCEPT POTENTIAL", m.concept_potential, "market power · X-axis"],
                      ["USER READINESS", m.user_readiness, "acceptance · Y-axis"]].map(([lab, val, sub], i) => (
                      <div key={i} style={{ border: `1px solid ${T.paperLine}`, borderRadius: 2, padding: "14px 16px" }}>
                        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: "0.12em", color: T.mutedPaper }}>{lab}</div>
                        <div style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 30, lineHeight: 1.1, color: val >= 100 ? T.build : T.notyet }}>
                          {val}<span style={{ fontSize: 13, color: T.mutedPaper }}> vs 100</span>
                        </div>
                        <div style={{ fontSize: 12, color: T.mutedPaper }}>{sub}</div>
                      </div>
                    ))}
                  </div>
                  {[["Addressable market", m.addressable, MPI_AVG.addressable],
                    ["Market interest", m.market_interest, MPI_AVG.market_interest],
                    ["Purchasing likelihood", m.purchase_interest, MPI_AVG.purchase_interest]].map(([lab, v, avg], i) => (
                    <div key={i} style={{ padding: "9px 0", borderTop: i ? `1px solid ${T.paperLine}` : "none" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                        <span style={{ color: T.dark }}>{lab}</span>
                        <span style={{ fontFamily: T.mono, color: v >= avg ? T.build : T.notyet }}>{pct(v)} <span style={{ color: T.mutedPaper }}>· avg {pct(avg)}</span></span>
                      </div>
                      <div style={{ height: 4, background: "#DDD9CE", borderRadius: 3, marginTop: 6, position: "relative", overflow: "hidden" }}>
                        <div style={{ width: pct(Math.min(1, v)), height: "100%", background: v >= avg ? T.build : T.notyet, borderRadius: 3 }} />
                        <div style={{ position: "absolute", left: pct(Math.min(1, avg)), top: -2, width: 1.5, height: 8, background: T.dark, opacity: 0.55 }} />
                      </div>
                    </div>
                  ))}
                  {m.rationale && <div style={{ fontSize: 13, lineHeight: 1.55, color: T.dark, marginTop: 14 }}>{m.rationale}</div>}
                  {m.vs_benchmark && <div style={{ fontSize: 13, lineHeight: 1.5, color: T.mutedPaper, marginTop: 6 }}>{m.vs_benchmark}</div>}
                </div>
              )}

              {/* ── LENS 3 · EXPERT PANEL ── */}
              {ex && (
                <div style={{ marginTop: 40 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
                    <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.muted }}>LENS 3 · EXPERT PANEL <span style={{ opacity: 0.7 }}>(30 aging / Japan-market experts)</span></div>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      {ex.vs_quant && <span style={{ fontFamily: T.mono, fontSize: 10, color: T.muted }}>{String(ex.vs_quant).replace(/_/g, " ")}</span>}
                      <span style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 12, letterSpacing: "0.08em", color: vColor(ex.overall_verdict), border: `1px solid ${vColor(ex.overall_verdict)}`, borderRadius: 2, padding: "4px 10px" }}>{String(ex.overall_verdict || "").replace(/_/g, " ").toUpperCase()}</span>
                    </div>
                  </div>
                  {ex.reading && <p style={{ fontSize: 15, lineHeight: 1.6, color: T.paper, opacity: 0.9, borderLeft: `2px solid ${vColor(ex.overall_verdict)}`, paddingLeft: 14, margin: "0 0 18px" }}>{ex.reading}</p>}
                  {ex.risks && ex.risks.length > 0 && (
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
                        <span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.muted }}>RISKS FLAGGED</span>
                        <span style={{ fontFamily: T.mono, fontSize: 10, color: T.muted, letterSpacing: "0.02em" }}>difficulty to overcome:&nbsp;
                          <span style={{ color: T.notyet }}>HARD</span> likely blocker&nbsp;·&nbsp;
                          <span style={{ color: T.refine }}>MEDIUM</span> adds cost/time&nbsp;·&nbsp;
                          <span style={{ color: T.build }}>EASY</span> manageable
                        </span>
                      </div>
                    <div style={{ display: "grid", gap: 8 }}>
                      {ex.risks.map((r, i) => (
                        <div key={i} style={{ background: T.ink2, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "12px 14px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10 }}>
                            <span style={{ fontFamily: T.display, fontWeight: 500, fontSize: 15, color: T.paper }}>{r.theme}</span>
                            <span style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: "0.08em", color: sevColor(r.severity), whiteSpace: "nowrap" }}>{String(r.severity || "").toUpperCase()}</span>
                          </div>
                          {r.note && <div style={{ fontSize: 13, lineHeight: 1.5, color: T.muted, marginTop: 4 }}>{r.note}</div>}
                        </div>
                      ))}
                    </div>
                    </div>
                  )}
                  {ex.strengths && ex.strengths.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.muted }}>ENABLERS</span>
                      {ex.strengths.map((s, i) => (
                        <div key={i} style={{ fontSize: 14, lineHeight: 1.55, color: T.paper, opacity: 0.85, marginTop: 5 }}>+ {s}</div>
                      ))}
                    </div>
                  )}
                  {ex.japan_entry && (
                    <div style={{ borderTop: `1px solid ${T.inkLine}`, paddingTop: 14, display: "flex", gap: 12, alignItems: "flex-start" }}>
                      <AlertTriangle size={16} color={T.refine} style={{ flexShrink: 0, marginTop: 3 }} />
                      <div><span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.muted }}>JAPAN-ENTRY WATCH</span>
                        <div style={{ fontSize: 14, lineHeight: 1.6, color: T.paper, opacity: 0.9, marginTop: 5 }}>{ex.japan_entry}</div></div>
                    </div>
                  )}
                </div>
              )}

              <div className="no-print" style={{ marginTop: 40, display: "flex", gap: 10, flexWrap: "wrap" }}>
                <button onClick={() => savePdf(result)} style={{ background: T.paper, color: T.dark, border: "none", borderRadius: 2, padding: "11px 18px", fontFamily: T.mono, fontWeight: 700, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  <Download size={14} /> SAVE AS PDF
                </button>
                <button onClick={() => downloadJSON(result)} style={{ background: "transparent", color: T.muted, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "11px 18px", fontFamily: T.mono, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  <FileJson size={14} /> DATA (JSON)
                </button>
                <button onClick={reset} style={{ background: "transparent", color: T.muted, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "11px 18px", fontFamily: T.mono, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  <RotateCcw size={13} /> APPRAISE ANOTHER
                </button>
              </div>

              <p style={{ marginTop: 28, fontSize: 12, lineHeight: 1.6, color: T.muted, fontFamily: T.mono }}>
                Three lenses, one product. Lens 1 is founder-mode judgement. Lens 2 predicts placement on the Living Best MPI (135-concept QOL study, real study-wide averages) — a prediction, not a fielded survey. Lens 3 applies the framework 30 aging/Japan-market experts actually used; calibrated to that domain, applied by analogy elsewhere.
              </p>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Appraiser />);
  </script>
</body>
</html>
