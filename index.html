// Compact SHA-256 (pure JS — crypto.subtle is unavailable on plain-HTTP hosts).
function sha256hex(str) {
  const K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const bytes = Array.from(new TextEncoder().encode(str));
  const bitLen = bytes.length * 8;
  bytes.push(0x80);
  while (bytes.length % 64 !== 56) bytes.push(0);
  for (let i = 7; i >= 0; i--) bytes.push((bitLen / Math.pow(2, i * 8)) & 0xff);
  const rr = (x, n) => (x >>> n) | (x << (32 - n));
  const w = new Array(64);
  for (let off = 0; off < bytes.length; off += 64) {
    for (let i = 0; i < 16; i++)
      w[i] = (bytes[off+4*i] << 24) | (bytes[off+4*i+1] << 16) | (bytes[off+4*i+2] << 8) | bytes[off+4*i+3];
    for (let i = 16; i < 64; i++) {
      const s0 = rr(w[i-15],7) ^ rr(w[i-15],18) ^ (w[i-15] >>> 3);
      const s1 = rr(w[i-2],17) ^ rr(w[i-2],19) ^ (w[i-2] >>> 10);
      w[i] = (w[i-16] + s0 + w[i-7] + s1) | 0;
    }
    let [a,b,c,d,e,f,g,h] = H;
    for (let i = 0; i < 64; i++) {
      const S1 = rr(e,6) ^ rr(e,11) ^ rr(e,25);
      const ch = (e & f) ^ (~e & g);
      const t1 = (h + S1 + ch + K[i] + w[i]) | 0;
      const S0 = rr(a,2) ^ rr(a,13) ^ rr(a,22);
      const maj = (a & b) ^ (a & c) ^ (b & c);
      const t2 = (S0 + maj) | 0;
      h = g; g = f; f = e; e = (d + t1) | 0; d = c; c = b; b = a; a = (t1 + t2) | 0;
    }
    H = H.map((x, i) => (x + [a,b,c,d,e,f,g,h][i]) | 0);
  }
  return H.map(x => (x >>> 0).toString(16).padStart(8, "0")).join("");
}

function buildPrompt(url) {
  return `You are a product diagnostic that scores ONE product at this URL through THREE independent lenses. Your job is diagnosis, not encouragement. URL: ${url}

First, research it with web search: what it does, who it is for, pricing, real traction or usage signals, customer reviews, named competitors and substitutes with their pricing, and the status-quo alternative people use today. A marketing website states the founder's claims — it is NOT evidence of demand. Treat claims as claims. Plain, blunt language. Never use: delve, crucial, robust, comprehensive, leverage, foster, showcase.

═══ LENS 1 — SILICON VALLEY VIEW (founder-mode, YC-style), six dimensions 0–10 each (60 total) ═══
Be stingy: a 7+ needs concrete behavioral evidence (people paying, expanding usage, building a workflow around it, scrambling if it vanished), not a good story or a slick site. Where you only have website claims, cap it low and say what evidence is missing. Take a position on every dimension.
- demand: pays / scrambles when it breaks || people find it interesting
- pain: costly ongoing duct-taped workaround today || there's no current solution
- customer: a named person, role, consequence || a category
- wedge: shippable now, someone pays this week || need the whole platform first
- learning: watched real usage, was surprised, adapted || surveys / demos / as expected
- durability: specific thesis on why it gets MORE essential in 3 years || rising tide / growth-rate
Bands: 45–60 strong; 30–44 refine; <30 not proven. Then 2–3 directions (one minimal wedge, one ideal, optionally one lateral) each with effort S/M/L + risk Low/Med/High; recommend one tied to the weakest dimension; end with ONE concrete evidence-producing action.

═══ LENS 2 — JAPAN CONSUMER VIEW (Living Best MPI concept-test benchmark) ═══
Estimate how this product would score if it were run through a large consumer concept-test survey (the Living Best MPI, a QOL/eldercare study of 174 tested concepts). Estimate THREE fractions 0–1, grounded in your research and calibrated to the study benchmarks:
- addressable: fraction who would see it as appropriate for at least one buying scenario (did NOT pick "none of the above"). Study average ≈ 0.50.
- market_interest: top-3-box interest with the 3rd box discounted 50%. Study average ≈ 0.27.
- purchase_interest: top-2-box purchase intent with the 2nd box discounted 50%. Study average ≈ 0.14.
Calibration anchors (addressable/interest/purchase → resulting index): BrainHQ 0.61/0.43/0.25→333 (a top performer); Comfort Linen 0.49/0.28/0.21→150; Assistme 0.39/0.20/0.14→57 (weak); Bleep 0.42/0.20/0.07→33 (bottom). Index 100 = study average. Do NOT compute the index yourself — just estimate the three fractions honestly (most products land near or below the averages) and explain your reasoning in one line, plus one line on how it compares to the benchmark.

═══ LENS 3 — EXPERT VIEW (30-expert panel, secondary cross-reference) ═══
Assess as our panel of 30 aging/eldercare + Japan-market experts would. They are skeptical by default (of 30 interviews: 19 mixed, 7 skeptical, only 4 positive) and consistently probe these themes (share of experts who raised each): ${EXPERT_THEMES.map(([t, p]) => `${t} (${Math.round(p * 100)}%)`).join("; ")}. Judge the product against each relevant theme; do not invent enthusiasm. If it is lukewarm or fails a theme, say so. For each risk set how hard it is to overcome for market entry: "hard" = likely to block or materially delay entry unless resolved; "medium" = a real obstacle that adds cost or time or needs a specific mitigation; "easy" = a minor, manageable concern. Give an overall verdict on the same 5-point scale the panel used. State the single strongest Japan-market-entry risk and any genuine enabler. If the product is outside eldercare/Japan, apply the same lens by analogy and say so.

═══ LENS 4 — MARKET LANDSCAPE VIEW (positioning + competitive research) ═══
Do real competitive research with web search — do not stop at the product's own claims about competitors.
- Identify 4–7 NAMED alternatives a buyer would actually consider: direct competitors, adjacent products, and the status-quo substitute (including "do nothing" or a human service if that is the real alternative). For each: what it is in one line, pricing where findable, and — honestly — whether the appraised product beats it, matches it, or loses to it, and on what.
- Category maturity: nascent (few players, unproven demand) / growing (rising entrants, demand forming) / crowded (many similar offers, feature parity) / consolidating (incumbents absorbing the category).
- Positioning: name the TWO buying criteria that actually decide purchases in this category (not the vendor's preferred framing), state where this product sits on each, and who sits closest to it.
- White space: is the claimed differentiation real, defensible, and valued by buyers — or marketing? One blunt line.
- Positioning statement: one sentence — "For [buyer] who [need], this is the [category] that [key difference], unlike [nearest alternative]."

═══ EXECUTIVE SUMMARY — synthesize all four lenses ═══
After completing all four lenses, write the synthesis a decision-maker reads first: an overall call in 2–3 sentences (invest attention / proceed with conditions / pass — and why), one line per lens, where the lenses converge, the sharpest tension between any two lenses and which one to trust more here, and the single next step. Keep these lines qualitative — do not quote numeric scores or the /60 total in the executive summary.

═══ QUESTIONS FOR THE FOUNDERS ═══
Write 5–8 follow-up questions we would put to the founders, each one produced by a specific gap this appraisal surfaced — a missing piece of evidence from the Silicon Valley view, an unproven consumer assumption from the Japan view, a risk the expert panel would press on, or an unclear competitive claim from the landscape. Sharp diligence questions, not generic ones: each should be answerable with a number, a document, or a named customer, and a founder should not be able to deflect it with vision talk. No question that could be asked of any company.

Respond with ONLY a JSON object, no markdown, no preamble, exactly this shape:
{"product":"","one_liner":"","summary":"2-3 sentence read of what you found",
 "dimensions":[{"key":"demand","score":0,"justification":"one line tied to a fact you found","evidence_missing":"what you couldn't find","change_my_mind":"what evidence would move this"}],

 "directions":[{"label":"","kind":"minimal_wedge|ideal|lateral","effort":"S|M|L","risk":"Low|Med|High","summary":""}],

 "mpi":{"addressable":0.0,"market_interest":0.0,"purchase_interest":0.0,"rationale":"one line on why these fractions","vs_benchmark":"one line vs study averages"},
 "expert":{"overall_verdict":"enthusiastic_endorse|endorse|mixed|skeptical|reject","risks":[{"theme":"","severity":"hard|medium|easy","note":"one line"}],"strengths":["one line"],"japan_entry":"single strongest entry risk or enabler","vs_quant":"expert_more_bullish|aligned|expert_more_bearish","reading":"1-2 sentences: what the expert lens adds beyond the survey score"},
 "landscape":{"category_maturity":"nascent|growing|crowded|consolidating","competitors":[{"name":"","type":"direct|adjacent|substitute","note":"what it is + pricing if found","edge":"beats/matches/loses vs this product, and on what"}],"axes":"the two criteria that decide purchases + where this product sits on each","nearest":"who sits closest and why","white_space":"one blunt line: real differentiation or marketing","positioning_statement":"For [buyer] who [need], this is the [category] that [difference], unlike [nearest alternative]","read":"1-2 sentence blunt read of the competitive position"},
 "exec":{"overall":"2-3 sentence call: invest attention / proceed with conditions / pass — and why","silicon_valley":"one line","japan_consumer":"one line","expert":"one line","market_landscape":"one line","convergence":"one line: where the lenses agree","tension":"one line: sharpest disagreement between two lenses and which to trust here","next_step":"one line"},
 "founder_questions":[{"question":"the question, addressed to the founders","why":"one line: which gap from this appraisal it closes","lens":"silicon_valley|japan_consumer|expert|market_landscape"}]}
All six dimensions in the array, in order. 5-8 founder questions.`;
}

// derive MPI indices from the three estimated fractions using the real study averages
function computeMpi(mpi) {
  if (!mpi) return null;
  const a = Number(mpi.addressable) || 0, i = Number(mpi.market_interest) || 0, p = Number(mpi.purchase_interest) || 0;
  const intrigue = a ? i / a : 0, urgency = i ? p / i : 0;
  const cp = (a / MPI_AVG.addressable) * (i / MPI_AVG.market_interest) * (p / MPI_AVG.purchase_interest) * 100;
  const ur = (intrigue / MPI_AVG.intrigue) * (urgency / MPI_AVG.urgency) * 100;
  const quadrant = cp >= 200 && ur >= 100 ? "SUPERSTAR" : cp >= 100 && ur >= 100 ? "STAR"
    : cp >= 100 ? "SLOTH" : ur >= 100 ? "LION CUB" : "PROBLEM CHILD";
  return { ...mpi, intrigue, urgency, concept_potential: Math.round(cp), user_readiness: Math.round(ur), quadrant };
}

function extractJSON(data) {
  const text = (data.content || [])
    .filter((b) => b.type === "text").map((b) => b.text).join("\n");
  const a = text.indexOf("{"), b = text.lastIndexOf("}");
  if (a === -1 || b === -1) throw new Error("No appraisal came back. Try again.");
  return JSON.parse(text.slice(a, b + 1));
}

}

function downloadJSON(result) {
  const slug = (result.product || "appraisal").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 40);
  const blob = new Blob([JSON.stringify(result, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `living-best-mpi-${slug || "result"}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function Appraiser() {
  const [url, setUrl] = useState("");
  // One auth path everywhere: bring-your-own Anthropic key, gated by the
  // access passcode (checked as a SHA-256 hash — never in plaintext here).
  const load = (k) => { try { return localStorage.getItem(k) || ""; } catch (e) { return ""; } };
  const [keyVal, setKeyVal] = useState(() => load(KEY_STORE));
  const [passVal, setPassVal] = useState(() => load(PASS_STORE));
  const saveKeyVal = (v) => { setKeyVal(v); try { localStorage.setItem(KEY_STORE, v); } catch (e) {} };
  const savePassVal = (v) => { setPassVal(v); try { localStorage.setItem(PASS_STORE, v); } catch (e) {} };
  const [state, setState] = useState("idle"); // idle | loading | done | error
  const [result, setResult] = useState(null);
  const [err, setErr] = useState("");
  const [li, setLi] = useState(0);
  const timer = useRef(null);

  function fail(msg) { setErr(msg); setState("error"); }

  useEffect(() => {
    if (state === "loading") {
      timer.current = setInterval(() => setLi((i) => (i + 1) % LOADING.length), 1900);
    } else clearInterval(timer.current);
    return () => clearInterval(timer.current);
  }, [state]);

  async function run() {
    const clean = url.trim();
    if (!clean) return;
    const key = keyVal.replace(/\s+/g, "");   // strip spaces/newlines from a wrapped paste
    const pass = passVal.replace(/\s+/g, "");
    if (!pass) return fail("Enter the access passcode first.");
    if (!key) return fail("Add your Anthropic API key first.");
    if (sha256hex(pass) !== PASS_HASH) return fail("Wrong access passcode.");
    setState("loading"); setErr(""); setResult(null); setLi(0);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 8000,
          messages: [{ role: "user", content: buildPrompt(clean) }],
          tools: [{ type: "web_search_20250305", name: "web_search" }],
        }),
      });
      if (!res.ok) {
        let detail = "";
        try { const e = await res.json(); detail = (e && e.error && e.error.message) || ""; } catch (x) {}
        const labels = { 401: "Authentication failed (401)", 403: "Permission denied (403)", 429: "Rate limited (429)", 400: "Bad request (400)" };
        const head = labels[res.status] || ("Request failed (" + res.status + ")");
        throw new Error(detail ? (head + " — " + detail) : (head + ". Try again."));
      }
      const json = await res.json();
      const parsed = extractJSON(json);
      parsed.total = (parsed.dimensions || []).reduce((s, d) => s + (Number(d.score) || 0), 0);
      parsed.mpi = computeMpi(parsed.mpi);
      parsed.url = clean;
      setResult(parsed); setState("done");
    } catch (e) {
      setErr(e.message || "Something broke. Try again."); setState("error");
    }
  }

  function reset() { setState("idle"); setResult(null); setUrl(""); setErr(""); }

  return (
    <div style={{ background: T.ink, minHeight: "100vh", color: T.paper, fontFamily: T.body }}>
      <div style={{ maxWidth: 880, margin: "0 auto", padding: "clamp(24px,5vw,56px) clamp(18px,5vw,40px)" }}>

        {/* masthead */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${T.inkLine}`, paddingBottom: 16, marginBottom: "clamp(28px,6vw,44px)", gap: 14, flexWrap: "wrap" }}>
          <img src="lb-logo.svg" alt="Living Best" style={{ height: 104, width: "auto" }} />
          <span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.muted, whiteSpace: "nowrap" }}>MULTIFACTORIAL MPI · FOUR LENSES</span>
        </div>

        {/* input / hero */}
        {state !== "done" && (
          <div style={{ marginBottom: 8 }}>
            <h1 style={{ fontFamily: T.display, fontWeight: 700, fontSize: "clamp(28px,5.4vw,46px)", lineHeight: 1.08, letterSpacing: "-0.02em", margin: "0 0 16px", color: T.paper }}>

                    {land.axes && <div><span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.mutedPaper }}>WHAT DECIDES PURCHASES</span>
                      <div style={{ fontSize: 14, lineHeight: 1.55, color: T.dark, marginTop: 4 }}>{land.axes}</div></div>}
                    {land.nearest && <div><span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.mutedPaper }}>NEAREST RIVAL</span>
                      <div style={{ fontSize: 14, lineHeight: 1.55, color: T.dark, marginTop: 4 }}>{land.nearest}</div></div>}
                    {land.white_space && <div><span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.mutedPaper }}>WHITE SPACE</span>
                      <div style={{ fontSize: 14, lineHeight: 1.55, color: T.dark, marginTop: 4 }}>{land.white_space}</div></div>}
                    {land.positioning_statement && (
                      <div style={{ borderTop: `1px solid ${T.paperLine}`, paddingTop: 12 }}>
                        <span style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.12em", color: T.mutedPaper }}>POSITIONING STATEMENT</span>
                        <div style={{ fontFamily: T.display, fontWeight: 500, fontSize: 15.5, lineHeight: 1.55, color: T.dark, marginTop: 5 }}>{land.positioning_statement}</div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* ── QUESTIONS FOR THE FOUNDERS ── */}
              {fq.length > 0 && (
                <div style={{ marginTop: 40 }}>
                  <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: "0.14em", color: T.muted, marginBottom: 6 }}>QUESTIONS FOR THE FOUNDERS</div>
                  <p style={{ fontSize: 13, lineHeight: 1.55, color: T.muted, margin: "0 0 16px" }}>
                    Follow-ups produced by the gaps this appraisal surfaced — each answerable with a number, a document, or a named customer.
                  </p>
                  <div style={{ display: "grid", gap: 10 }}>
                    {fq.map((q, i) => (
                      <div key={i} className="print-avoid-break" style={{ background: T.ink2, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "14px 16px" }}>
                        <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                          <span style={{ fontFamily: T.mono, fontWeight: 700, fontSize: 13, color: T.accent, flexShrink: 0, marginTop: 1 }}>{String(i + 1).padStart(2, "0")}</span>
                          <div style={{ minWidth: 0 }}>
                            <div style={{ fontFamily: T.display, fontWeight: 500, fontSize: 15.5, lineHeight: 1.5, color: T.paper }}>{q.question}</div>
                            <div style={{ fontSize: 12.5, lineHeight: 1.5, color: T.muted, marginTop: 5 }}>
                              {LENS_NAME[q.lens] && <span style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: "0.06em", color: T.mint }}>{LENS_NAME[q.lens].toUpperCase()}&nbsp;&nbsp;</span>}
                              {q.why}
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="no-print" style={{ marginTop: 40, display: "flex", gap: 10, flexWrap: "wrap" }}>
                <button onClick={() => savePdf(result)} style={{ background: T.paper, color: T.dark, border: "none", borderRadius: 2, padding: "11px 18px", fontFamily: T.mono, fontWeight: 700, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  <Download size={14} /> SAVE AS PDF
                </button>
                <button onClick={() => downloadJSON(result)} style={{ background: "transparent", color: T.muted, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "11px 18px", fontFamily: T.mono, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  <FileJson size={14} /> DATA (JSON)
                </button>
                <button onClick={reset} style={{ background: "transparent", color: T.muted, border: `1px solid ${T.inkLine}`, borderRadius: 2, padding: "11px 18px", fontFamily: T.mono, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  <RotateCcw size={13} /> APPRAISE ANOTHER
                </button>
              </div>

              <p style={{ marginTop: 28, fontSize: 12, lineHeight: 1.6, color: T.muted, fontFamily: T.mono }}>
                Four lenses, one product. Silicon Valley View is founder-mode judgement. Japan Consumer View predicts placement on the Living Best MPI (174-concept QOL study, real study-wide averages) — a prediction, not a fielded survey. Expert View applies the framework 30 aging/Japan-market experts actually used. Market Landscape View maps named competitors and positioning from live research. Lenses 2–3 are calibrated to the eldercare/Japan domain and applied by analogy elsewhere.
              </p>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Appraiser />);
  </script>
</body>
</html>
