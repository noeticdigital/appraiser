# Appraiser — locations to add inside the existing `server { … }` block
# in /etc/nginx/sites-enabled/noetic, BEFORE the catch-all `location / {`.
# Static page lives in /var/www/appraiser; proxy runs on 127.0.0.1:8090.

    location = /appraiser { return 301 /appraiser/; }

    location /appraiser/ {
        alias /var/www/appraiser/;
        index index.html;
        try_files $uri $uri/ /appraiser/index.html;
    }

    location = /appraiser/api/appraise {
        proxy_pass http://127.0.0.1:8090/appraise;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;   # web-search appraisals can take minutes
    }
